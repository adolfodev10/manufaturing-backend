services:
  - type: web
    name: manufaturing-backend
    runtime: node
    repo: https://github.com/adolfodev10/manufaturing-backend
    branch: main
    buildCommand: npm install && npx prisma generate && tsc
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manufaturing-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CROSS_ORIGIN
        value: https://eko-manufaturing.vercel.app

databases:
  - name: manufaturing-db
    databaseName: manufaturing
    user: manufaturing_user